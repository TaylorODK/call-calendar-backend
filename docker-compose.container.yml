volumes:
  pg_calendar_data:

services:

  app:
    build: .
    container_name: calendar-app
    restart: always
    ports:
      - "8000:8000"
    command:
     - bash
     - /app/app_start.sh
    volumes:
      - ./backend/:/app/
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:17.1-alpine3.20
    container_name: calendar-postgres
    env_file: .env
    volumes:
      - pg_calendar_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: calendar-redis
    ports:
      - "36379:6379"
    env_file:
      - .env
  
  celery_worker:
    build: .
    container_name: calendar-celery-worker
    command: >
      sh -c "celery -A calendar_backend worker -l info"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - app
  
  celery_beat:
    build: .
    container_name: calendar-celery-beat
    command: >
      sh -c "celery -A calendar_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
