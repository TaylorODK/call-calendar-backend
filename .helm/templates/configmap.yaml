{{- $microservice := .Values.configMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $microservice }}-{{ $.Release.Name }}-{{ $.Values.stage }}
  namespace: call-calendar-{{ $.Values.stage }}
  labels:
    app.kubernetes.io/name: {{ $microservice }}-{{ $.Release.Name }}-{{ $.Values.stage }}
    app.kubernetes.io/instance: {{ $microservice }}-{{ $.Release.Name }}-{{ $.Values.stage }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
data:
  default.conf: |
    upstream backend {
    server app-{{ $.Release.Name }}-{{ $.Values.stage }}:8000;
    }

    server {
      listen 80;
      location /static/ {
        alias /app/backend/static/;
        expires 7d;
        add_header Cache-Control "public";
      }

      location / {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }